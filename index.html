<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almuerzos PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --accent: #22c55e;
  --text: #e2e8f0;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.save { background: var(--accent); }
.reset { background: #ef4444; }

.item {
  background: #334155;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.stars { color: gold; }

.filtros {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}

</style>
</head>

<body>

<div class="container">

<h1>🍽️ Almuerzos</h1>

<div class="card">
  <input type="date" id="fecha" max="2026-12-31">
  <input type="text" id="poblacion" placeholder="Población">
  <input type="text" id="restaurante" placeholder="Restaurante">
  <input type="number" id="precio" placeholder="Precio (€)">

  <select id="pagador">
    <option value="">Quién paga</option>
    <option>Toni</option>
    <option>Verde</option>
    <option>Sr. Felipe</option>
  </select>

  <input type="number" id="puntuacion" min="1" max="10" placeholder="Puntuación (1-10)">

  <button class="save" onclick="guardar()">Guardar</button>
  <button class="reset" onclick="resetData()">Reset</button>
</div>

<div class="card">
  <h3>🔎 Filtros</h3>
  <div class="filtros">
    <select id="filtroPersona" onchange="render()">
      <option value="">Todos</option>
      <option>Toni</option>
      <option>Verde</option>
      <option>Sr. Felipe</option>
    </select>
    <input type="date" id="fechaInicio" onchange="render()">
    <input type="date" id="fechaFin" onchange="render()">
  </div>
</div>

<div class="card">
  <h3>📋 Historial</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>📊 Gasto por persona</h3>
  <canvas id="grafica"></canvas>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("almuerzos")) || [];

function estrellas(p){
  return "⭐".repeat(Math.ceil(p/2));
}

function guardar(){
  let r = {
    fecha: fecha.value,
    poblacion: poblacion.value,
    restaurante: restaurante.value,
    precio: parseFloat(precio.value),
    pagador: pagador.value,
    puntuacion: parseInt(puntuacion.value)
  };

  if(!r.fecha || !r.poblacion || !r.restaurante || !r.pagador){
    alert("Completa todos los campos");
    return;
  }

  data.push(r);
  localStorage.setItem("almuerzos", JSON.stringify(data));
  render();
}

function resetData(){
  if(confirm("¿Borrar todo y reiniciar la app?")){

    // BORRAR DATOS
    localStorage.removeItem("almuerzos");
    data = [];

    // LIMPIAR FORMULARIO
    document.getElementById("fecha").value = "";
    document.getElementById("poblacion").value = "";
    document.getElementById("restaurante").value = "";
    document.getElementById("precio").value = "";
    document.getElementById("pagador").value = "";
    document.getElementById("puntuacion").value = "";

    // LIMPIAR FILTROS
    document.getElementById("filtroPersona").value = "";
    document.getElementById("fechaInicio").value = "";
    document.getElementById("fechaFin").value = "";

    // LIMPIAR LISTA
    document.getElementById("lista").innerHTML = "";

    // LIMPIAR GRÁFICA
    if(chart){
      chart.destroy();
    }

    // VOLVER A ESTADO INICIAL
    render();
  }
}

function filtrar(){
  return data.filter(d=>{
    return (!filtroPersona.value || d.pagador===filtroPersona.value) &&
           (!fechaInicio.value || d.fecha>=fechaInicio.value) &&
           (!fechaFin.value || d.fecha<=fechaFin.value);
  });
}

function render(){
  let lista = document.getElementById("lista");
  lista.innerHTML="";

  let f = filtrar();

  f.forEach(d=>{
    lista.innerHTML += `
      <div class="item">
        <b>${d.restaurante}</b><br>
        ${d.poblacion} - ${d.fecha}<br>
        €${d.precio} | ${d.pagador}<br>
        <span class="stars">${estrellas(d.puntuacion)}</span>
      </div>
    `;
  });

  grafica(f);
}

let chart;

function grafica(datos){

 let totales = {
  "Chuliá":0,
  "Verde":0,
  "Sr. Felipe":0
};

  datos.forEach(d=>{
    totales[d.pagador] += d.precio;
  });

  let ctx = document.getElementById("grafica");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(totales),
      datasets:[{
        label:"Gasto total (€)",
        data:Object.values(totales)
      }]
    }
  });
}

render();

</script>

</body>
</html>
